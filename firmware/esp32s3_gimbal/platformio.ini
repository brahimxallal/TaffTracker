 ; ESP32-S3-WROOM-1 N16R8: 16 MB flash, 8 MB Octal PSRAM (OPI).
; Native USB Serial/JTAG (plug USB cable into the S3 USB port).
[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8
framework = espidf
upload_port = COM4
monitor_port = COM4
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_type = release
board_build.sdkconfig_defaults = sdkconfig.defaults
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB
extra_scripts = pre:load_secrets.py
build_flags =
  -DTAFFF_USB_RX_BUFFER=2048
  -DTAFFF_USB_TX_BUFFER=512
  -DTAFFF_CONTROL_HZ=200
  -DTAFFF_UART_INGEST=0
  ; WiFi credentials injected by load_secrets.py from wifi_secrets.env
  ; --- Servo range (MG996R: 500-2500µs, 180°) ---
  -DTAFFF_SERVO_MIN_US=500
  -DTAFFF_SERVO_MAX_US=2500
  -DTAFFF_SERVO_RANGE_DEG=180.0f
  ; --- Servo calibration offsets (match config.yaml) ---
  -DTAFFF_PAN_OFFSET_DEG=-65.0f
  -DTAFFF_TILT_OFFSET_DEG=7.0f
